<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web App Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="code">
      <div class="tabs">
        <button class="tab active" data-tab='html-editor'>HTML</button>
        <button class="tab" data-tab='css-editor'>CSS</button>
        <button class="tab" data-tab='js-editor'>JS</button>
      </div>
      <div class="editor">
        <div id="html-editor" class="editor-pane active" placeholder="html"></div>
        <div id="css-editor" class="editor-pane" placeholder="css"></div>
        <div id="js-editor" class="editor-pane" placeholder='js'></div>
      </div>
    </div>
   <div class="divider" id="divider"></div>
    <div class="preview">
      <iframe id="output" sandbox='allow-scripts'></iframe>
    </div>
  </div>
  <script src='script.js' type='module'></script>
</body>
</html>
